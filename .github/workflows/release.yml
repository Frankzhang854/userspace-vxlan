name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
          - name: linux-386
            goos: linux
            goarch: "386"
          - name: linux-arm64
            goos: linux
            goarch: arm64
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
          - name: linux-armv6
            goos: linux
            goarch: arm
            goarm: "6"
          - name: linux-mips
            goos: linux
            goarch: mips
          - name: linux-mipsle
            goos: linux
            goarch: mipsle
          - name: linux-mips-softfloat
            goos: linux
            goarch: mips
            gomips: softfloat
          - name: linux-mipsle-softfloat
            goos: linux
            goarch: mipsle
            gomips: softfloat
          - name: linux-riscv64
            goos: linux
            goarch: riscv64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          MATRIX_GOARM: ${{ matrix.goarm }}
          MATRIX_GOMIPS: ${{ matrix.gomips }}
        run: |
          set -eux
          if [ -n "${MATRIX_GOARM}" ]; then
            export GOARM="${MATRIX_GOARM}"
          fi
          if [ -n "${MATRIX_GOMIPS}" ]; then
            export GOMIPS="${MATRIX_GOMIPS}"
          fi
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/tapvxlan-udp-${{ matrix.name }}" \
            ./cmd/tapvxlan-udp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tapvxlan-udp-${{ matrix.name }}
          path: dist/tapvxlan-udp-${{ matrix.name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -eux
          cd dist
          sha256sum tapvxlan-udp-* | sort -k2 > checksums.txt
          cat checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tapvxlan-udp-*
            dist/checksums.txt
            userspace-vxlan-tailscale.sh
          generate_release_notes: true
